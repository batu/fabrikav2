# Reference comparison for the Codex Wool Crush lane. Human-provided video
# extracts live in the sibling `games/wool_crush/refs` input surface; this game
# consumes them in place and never ships or rewrites them.
game: wool_crush_x

reference:
  package: com.example.woolcrush
  version: video-extract-2026-07-09
  device: source-video
  host: ubuntu-server
  adb: /home/batu/android-sdk/platform-tools/adb
  serial: null

v2:
  package: com.basegamelab.woolcrushx.dev
  version: dev
  viewport: 390x844

verifyDevice:
  indistinguishableStates:
    allow:
      - states: [level, pause]
        reason: "The shell pauses the live canvas in place without adding a visual modal; lifecycle suspension is the state difference."
  platform: ios
  contentInsetTop: 130

states:
  - name: menu
    reference:
      offline: ../wool_crush/refs/art/menu-132.png
    v2:
      gap: "no v2 capture yet"
      driveTo: menu

  - name: level
    reference:
      offline: ../wool_crush/refs/art/gameplay-20.png
    v2:
      gap: "no v2 capture yet"
      driveTo: level

  - name: settings
    reference:
      offline: ../wool_crush/refs/art/settings-128.png
    v2:
      gap: "no v2 capture yet"
      driveTo: settings

  - name: pause
    reference:
      gap: "No paused reference frame was extracted from the source video."
    v2:
      gap: "no v2 capture yet"
      driveTo: pause

  - name: win
    reference:
      offline: ../wool_crush/refs/art/win-120.png
    v2:
      gap: "no v2 capture yet"
      driveTo: win

  - name: fail
    reference:
      offline: ../wool_crush/refs/art/fail-448.png
    v2:
      gap: "no v2 capture yet"
      driveTo: fail
