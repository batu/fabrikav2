<!doctype html>
<html lang="en" data-scheme="mint">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Wool Crush X</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
    <!-- Preload home-critical icons so they're cached before the home renders
         (loads during main.ts's viewport-stabilize wait). -->
    <link rel="preload" as="image" href="/ui/menu-icons/icon_coin.png" />
    <link rel="preload" as="image" href="/ui/menu-icons/icon_hint_magnifier.png" />
    <link rel="preload" as="image" href="/ui/menu-icons/shop-icon-runtime.png" />
    <link rel="preload" as="image" href="/ui/menu-icons/settings-icon-runtime.png" />
    <link rel="preload" as="image" href="/ui/home/no-ads-runtime.png" />
    <link rel="preload" as="image" href="/ui/home/play-level-button-runtime.png" />
    <link rel="preload" as="image" href="/ui/home/home-banner-mascot-runtime.png" />
    <link rel="preload" as="image" href="/ui/home/node-current-candy.png" />
    <link rel="preload" as="image" href="/ui/home/level-node-locked-runtime.png" />
    <link rel="preload" as="image" href="/ui/home/level-node-locked-bones-runtime.png" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        background: linear-gradient(180deg, #fff7dc 0%, #ffdba5 48%, #f7b46c 100%);
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
        background: linear-gradient(180deg, #fff7dc 0%, #ffdba5 48%, #f7b46c 100%);
      }
      #game-container canvas {
        touch-action: none;
      }
      #hud-overlay {
        pointer-events: none;
        position: absolute;
        inset: 0;
        z-index: 2;
      }
      #scene-transition-cover {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        pointer-events: auto;
        background: linear-gradient(180deg, #ecfaf3 0%, #cdeee0 48%, #a3dcc4 100%);
        opacity: 1;
      }
      @keyframes bootSpin { to { transform: rotate(360deg); } }
      .scene-transition-cover-avatar {
        animation: bootSpin 1.6s linear infinite;
        width: clamp(140px, 38vw, 200px);
        height: auto;
        display: block;
        object-fit: contain;
        filter:
          drop-shadow(0 18px 32px rgba(128, 80, 27, 0.22))
          drop-shadow(0 6px 14px rgba(128, 80, 27, 0.16));
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="scene-transition-cover" aria-hidden="true">
        <img class="scene-transition-cover-avatar" src="/ui/loading-icon.png" alt="" />
      </div>
      <div id="hud-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
