<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Marble Run</title>
    <link rel="icon" type="image/png" href="/design/assets/app-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        /* Reference bg: purple gradient with a repeating marble-SPHERE motif —
           two offset grids of translucent glass spheres (a bright off-centre
           highlight fading into the translucent --fab-color-bg-motif body) over
           the gradient, so the dots read as marbles, not flat discs. */
        background:
          radial-gradient(
            circle at 16px 14px,
            var(--fab-color-bg-motif-hi, rgba(255, 255, 255, 0.16)) 0 2px,
            var(--fab-color-bg-motif, rgba(255, 255, 255, 0.06)) 4px 9px,
            transparent 10px
          ),
          radial-gradient(
            circle at 67px 64px,
            var(--fab-color-bg-motif-hi, rgba(255, 255, 255, 0.16)) 0 1.5px,
            var(--fab-color-bg-motif, rgba(255, 255, 255, 0.06)) 3px 6px,
            transparent 7px
          ),
          linear-gradient(
            var(--fab-color-bg-top, #9b7bcd),
            var(--fab-color-bg-bottom, #6b568e)
          );
        background-size:
          100px 96px,
          100px 96px,
          100% 100%;
        font-family: var(--fab-font-family, system-ui, sans-serif);
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      #scene {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #hud,
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      /* #hud / #ui are pass-through overlay layers: interactive children opt in
         via their own `pointer-events: auto` (every @fabrikav2/ui primitive —
         .fab-btn, .fab-levelmap-node, .fab-modal-backdrop, .fab-page — and the
         in-game HUD's `.mr-hud button` already declare it). A blanket
         `#ui > * { pointer-events: auto }` here (id specificity 1,0,0) OVERRODE
         the toaster/economy/connectivity overlays' own `pointer-events: none`,
         turning the full-bleed `.fab-toaster` (inset:0, z-index:10) into a
         click-swallowing layer above the menu — the dead-buttons P1. The
         real-click e2e (tests/e2e/menu-clicks.spec.ts) guards it. */
      /* Menu banner: the plaque art is a frame; the title sits on its face.
         (Shell injects .mr-menu-banner/.mr-menu-title; layout lives here, not in
         the audited shell.) */
      .mr-menu-banner {
        position: relative;
        width: min(360px, 86vw);
        margin: 4px auto 2px;
        line-height: 0;
      }
      .mr-menu-banner-art {
        display: block;
        width: 100%;
        height: auto;
      }
      .mr-menu-title {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 16%;
        line-height: 1.05;
        text-align: center;
        font-family: var(--fab-font-family, 'Nunito', system-ui, sans-serif);
        font-weight: 900;
        font-size: clamp(22px, 7.4vw, 34px);
        letter-spacing: 0.01em;
        color: var(--fab-color-text, #6a3016);
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.5);
      }
      /* ---- Menu top-bar chrome (coin pill + gear) — teal candy panels ----
         Shell injects .mr-topbar/.mr-coin-pill/.mr-gear; layout + the token-fed
         candy look live here (index.html is outside the audited shell scope, so
         the var() fallbacks are legal). Colors resolve through the game-owned
         --fab-color-chrome-* tokens so a reskin re-colors the whole bar. */
      .mr-menu-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 8px;
        /* Clear the iOS status-bar zone so the coin pill + gear are not overlapped
           (--fab-safe-top = env(safe-area-inset-top); 0 off-device). */
        padding-top: var(--fab-safe-top, 0px);
      }
      .mr-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: min(430px, 94vw);
        margin: 6px auto 0;
      }
      .mr-coin-pill,
      .mr-gear {
        pointer-events: auto;
        cursor: pointer;
        border: 3px solid var(--fab-color-chrome-teal-border, #fff);
        background: linear-gradient(
          180deg,
          var(--fab-color-chrome-teal-top, #6fdcff),
          var(--fab-color-chrome-teal-bottom, #23a7db)
        );
        box-shadow:
          0 4px 0 var(--fab-color-chrome-teal-shadow, #1c7fb0),
          inset 0 2px 0 rgba(255, 255, 255, 0.35);
        color: var(--fab-color-chrome-ink, #fff);
        font-family: var(--fab-font-family, 'Nunito', system-ui, sans-serif);
        transition: transform 80ms ease;
      }
      .mr-coin-pill:active,
      .mr-gear:active {
        transform: translateY(2px);
        box-shadow:
          0 2px 0 var(--fab-color-chrome-teal-shadow, #1c7fb0),
          inset 0 2px 0 rgba(255, 255, 255, 0.35);
      }
      .mr-coin-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 16px 7px 9px;
        border-radius: var(--fab-radius-pill, 999px);
      }
      .mr-coin-pill-icon {
        width: 26px;
        height: 26px;
        object-fit: contain;
      }
      .mr-coin-pill-value {
        font-weight: 900;
        font-size: 18px;
        color: var(--fab-color-chrome-ink, #fff);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      }
      .mr-gear {
        display: grid;
        place-items: center;
        width: 52px;
        height: 52px;
        padding: 0;
        border-radius: 16px;
      }
      .mr-gear-icon {
        width: 32px;
        height: 32px;
        object-fit: contain;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.25));
      }

      /* ---- Single green LEVEL-start CTA (unlayered → beats .fab-btn-primary) ---- */
      .fab-btn.mr-level-cta {
        width: min(360px, 84vw);
        align-self: center;
        margin: 4px auto 0;
        padding: 16px 28px;
        border: 3px solid var(--fab-color-cta-green-border, #2f7d3f);
        border-radius: 20px;
        background: linear-gradient(
          180deg,
          var(--fab-color-cta-green-top, #7fe089),
          var(--fab-color-cta-green-bottom, #3fb356)
        );
        box-shadow:
          0 5px 0 var(--fab-color-cta-green-shadow, #2b8a3c),
          inset 0 2px 0 rgba(255, 255, 255, 0.35);
        color: var(--fab-color-cta-green-ink, #fff);
        font-weight: 900;
        font-size: 20px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        text-shadow: 0 2px 2px rgba(0, 0, 0, 0.2);
      }
      .fab-btn.mr-level-cta:active:not(:disabled) {
        transform: translateY(3px) scale(1);
        box-shadow:
          0 2px 0 var(--fab-color-cta-green-shadow, #2b8a3c),
          inset 0 2px 0 rgba(255, 255, 255, 0.35);
      }

      /* ---- Modal wood board layer behind the popup sprite ---- */
      .mr-modal-board {
        border-radius: 6px;
        background:
          linear-gradient(90deg, rgba(68, 35, 22, 0.72), rgba(151, 90, 48, 0.16) 12%, rgba(64, 32, 20, 0.58) 25%, rgba(162, 94, 48, 0.2) 37%, rgba(70, 36, 22, 0.64) 50%, rgba(151, 90, 48, 0.16) 62%, rgba(64, 32, 20, 0.58) 75%, rgba(162, 94, 48, 0.2) 87%, rgba(68, 35, 22, 0.74)),
          var(--fab-modal-backplate-image, none),
          linear-gradient(180deg, #6f371f, #8a4b2a 52%, #5d2c19);
        background-size: 100% 100%, 210px 210px, 100% 100%;
        background-repeat: no-repeat, repeat, no-repeat;
        background-position: center;
        background-blend-mode: normal, multiply, normal;
        box-shadow:
          inset 0 9px 0 rgba(116, 54, 26, 0.72),
          inset 0 -9px 0 rgba(42, 20, 13, 0.68),
          inset 22px 0 0 rgba(64, 31, 20, 0.58),
          inset -22px 0 0 rgba(64, 31, 20, 0.58),
          0 12px 20px rgba(20, 11, 8, 0.34);
      }
      .mr-modal-board::after {
        content: '';
        position: absolute;
        inset: 26px 38px;
        border-left: 5px solid rgba(255, 244, 216, 0.28);
        border-right: 5px solid rgba(30, 16, 11, 0.24);
        background: rgba(230, 206, 171, 0.24);
      }
      .mr-modal-board--result {
        width: min(92vw, 416px);
        aspect-ratio: 1.18 / 1;
        --fab-modal-backplate-transform: translate(-50%, calc(-50% + 36px));
      }
      .mr-modal-board--settings {
        width: min(96vw, 430px);
        height: min(66vh, 570px);
        --fab-modal-backplate-transform: translate(-50%, calc(-50% + 50px));
      }

      /* ---- Result cards — reference popup + floating candy CTAs ---- */
      .fab-modal-card.fab-result-card {
        width: min(78vw, 360px);
        min-width: min(78vw, 292px);
        padding: 96px 42px 58px;
        align-items: center;
        gap: 10px;
      }
      .fab-result-card .fab-modal-ribbon {
        position: absolute;
        z-index: 2;
        top: -82px;
        left: 50%;
        width: min(118%, 420px);
        margin: 0;
        transform: translateX(-50%);
      }
      .fab-result-card .fab-modal-ribbon--image .fab-modal-ribbon-eyebrow {
        position: absolute;
        top: 22%;
        left: 0;
        right: 0;
        color: var(--fab-ribbon-eyebrow-color, rgba(0, 0, 0, 0.38));
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.02em;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.16);
      }
      .fab-result-card .fab-result-body {
        align-items: center;
        gap: 20px;
        width: 100%;
      }
      .fab-result-card--lose .fab-result-body {
        gap: 24px;
      }
      .fab-result-card .fab-result-message {
        color: var(--fab-color-result-copy, #6170a7);
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        font-size: 27px;
        font-weight: 400;
        line-height: 1.24;
      }
      .fab-result-card .fab-result-art {
        width: 132px;
      }
      .fab-result-card .fab-result-art.mr-result-emoji {
        width: auto;
        font-size: 102px;
        line-height: 1;
        filter: drop-shadow(0 4px 0 rgba(32, 48, 80, 0.18));
      }
      .mr-reward {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: var(--fab-color-text-ink, #203050);
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        text-shadow:
          0 3px 0 var(--fab-color-chrome-ink, #fff),
          0 4px 0 rgba(32, 48, 80, 0.16);
      }
      .mr-reward-label {
        font-size: 30px;
        line-height: 1;
        text-transform: uppercase;
      }
      .mr-reward-amount {
        display: inline-flex;
        align-items: center;
        gap: 9px;
      }
      .mr-reward-icon {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }
      .mr-reward-value {
        font-size: 40px;
        line-height: 1;
      }
      .fab-result-card .fab-modal-actions {
        position: absolute;
        left: 50%;
        z-index: 3;
        width: min(76vw, 320px);
        transform: translateX(-50%);
        gap: 30px;
      }
      .fab-result-card--win .fab-modal-actions {
        top: calc(100% + 90px);
        width: min(58vw, 250px);
      }
      .fab-result-card--lose .fab-modal-actions {
        top: calc(100% - 18px);
      }
      /* Chunky Button_Green / Button_Orange candy treatment, sized for result
         screens. Token-driven so a reskin recolors the gradient without changing
         the shared @fabrikav2/ui button primitive. */
      .fab-modal-actions .fab-btn.mr-result-cta {
        width: 100%;
        min-height: 78px;
        padding: 13px 24px 18px;
        border: 4px solid var(--fab-color-cta-green-border, #2f7d3f);
        border-radius: 28px;
        background: linear-gradient(
          180deg,
          var(--fab-color-cta-green-top, #7fe089),
          var(--fab-color-cta-green-bottom, #3fb356)
        );
        box-shadow:
          0 5px 0 var(--fab-color-cta-green-shadow, #2b8a3c),
          inset 0 2px 0 rgba(255, 255, 255, 0.35);
        color: var(--fab-color-cta-green-ink, #fff);
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        font-weight: 400;
        font-size: 29px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        text-shadow:
          0 4px 0 var(--fab-color-text-ink, #203050),
          0 5px 0 rgba(0, 0, 0, 0.16);
      }
      .fab-modal-actions .fab-btn.mr-result-cta--yellow {
        border-color: var(--fab-color-cta-yellow-border, #203050);
        background: linear-gradient(
          180deg,
          var(--fab-color-cta-yellow-top, #ffe86a),
          var(--fab-color-cta-yellow-bottom, #ffad24)
        );
        box-shadow:
          0 5px 0 var(--fab-color-cta-yellow-shadow, #eb7500),
          inset 0 2px 0 rgba(255, 255, 255, 0.45);
      }
      .fab-modal-actions .fab-btn.mr-result-cta:active:not(:disabled) {
        transform: translateY(3px);
        box-shadow:
          0 2px 0 var(--fab-color-cta-green-shadow, #2b8a3c),
          inset 0 2px 0 rgba(255, 255, 255, 0.35);
      }
      .fab-modal-actions .fab-btn.mr-result-cta--yellow:active:not(:disabled) {
        box-shadow:
          0 2px 0 var(--fab-color-cta-yellow-shadow, #eb7500),
          inset 0 2px 0 rgba(255, 255, 255, 0.45);
      }

      /* ---- Settings modal (reference popup + ribbon + sprite buttons) ---- */
      .fab-modal-card.mr-settings-card {
        width: min(86vw, 390px);
        min-width: min(86vw, 300px);
        max-width: calc(100vw - 28px);
        min-height: min(69vh, 590px);
        padding: 92px 31px 34px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .mr-settings-card .fab-modal-ribbon {
        position: absolute;
        z-index: 2;
        top: -74px;
        left: 50%;
        width: min(104%, 370px);
        margin: 0;
        transform: translateX(-50%);
      }
      .mr-settings-card .fab-modal-ribbon-title {
        color: var(--fab-color-chrome-ink, #fff);
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        font-size: 32px;
        font-weight: 400;
        letter-spacing: 0;
        text-shadow:
          0 4px 0 var(--fab-color-text-ink, #203050),
          0 5px 0 rgba(0, 0, 0, 0.18);
        -webkit-text-stroke: 0;
        paint-order: normal;
      }
      .fab-btn.mr-settings-close {
        top: -70px;
        right: 10px;
        width: 62px;
        min-width: 62px;
        height: 62px;
        min-height: 62px;
        border: 3px solid var(--fab-color-chrome-teal-shadow, #1c7fb0);
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          var(--fab-color-chrome-teal-top, #6fdcff),
          var(--fab-color-chrome-teal-bottom, #23a7db)
        );
        box-shadow:
          0 5px 0 var(--fab-color-chrome-teal-shadow, #1c7fb0),
          inset 0 3px 0 rgba(255, 255, 255, 0.28);
        color: var(--fab-color-chrome-ink, #fff);
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        font-size: 27px;
        font-weight: 400;
        text-shadow: 0 3px 0 var(--fab-color-text-ink, #203050);
      }
      .fab-btn.mr-settings-close:active:not(:disabled) {
        transform: translateY(3px);
        box-shadow:
          0 2px 0 var(--fab-color-chrome-teal-shadow, #1c7fb0),
          inset 0 3px 0 rgba(255, 255, 255, 0.28);
      }
      .mr-settings-toggles {
        margin: 3px 0 31px;
      }
      .mr-settings-card .fab-toggle-rows {
        gap: 14px;
      }
      .mr-settings-card .fab-toggle-row {
        min-height: 72px;
        padding: 10px 17px 10px 22px;
        border-radius: 22px;
        background: var(--fab-color-settings-row, #eaf8ff);
        box-shadow:
          inset 0 3px 0 rgba(255, 255, 255, 0.82),
          0 4px 0 rgba(32, 48, 80, 0.08);
      }
      .mr-settings-card .fab-toggle-row-left {
        gap: 10px;
      }
      .mr-settings-card .fab-toggle-row-label {
        color: var(--fab-color-text-ink, #203050);
        font-family: var(--fab-font-family, 'Fredoka One', system-ui, sans-serif);
        font-size: 25px;
        font-weight: 400;
      }
      .mr-settings-card .fab-toggle-switch {
        width: 82px;
        height: 48px;
      }
      .mr-settings-card .fab-toggle-slider {
        background: linear-gradient(180deg, #d8e5ee, #b7c6d2);
        box-shadow:
          inset 0 4px 7px rgba(0, 0, 0, 0.16),
          0 2px 0 rgba(32, 48, 80, 0.09);
      }
      .mr-settings-card .fab-toggle-slider::before {
        width: 38px;
        height: 38px;
        left: 5px;
        bottom: 5px;
        background: var(--fab-color-toggle-thumb, #fff5df);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.62),
          0 2px 4px rgba(32, 48, 80, 0.22);
      }
      .mr-settings-card .fab-toggle-input:checked + .fab-toggle-slider {
        background: linear-gradient(
          180deg,
          var(--fab-color-cta-green-top, #7fe089),
          var(--fab-color-cta-green-bottom, #3fb356)
        );
      }
      .mr-settings-card .fab-toggle-input:checked + .fab-toggle-slider::before {
        transform: translateX(34px);
      }
      .mr-settings-actions {
        gap: 8px;
        align-items: center;
      }
      .mr-settings-actions--menu {
        gap: 6px;
      }
      .fab-modal-actions .fab-btn.mr-settings-action {
        width: min(220px, 68%);
        min-width: 0;
        min-height: 0;
        aspect-ratio: 435 / 200;
        padding: 0 26px 9px;
        border: 0;
        border-radius: 22px;
        background: var(--mr-settings-action-image) center / 100% 100% no-repeat;
        box-shadow: none;
        color: var(--fab-color-chrome-ink, #fff);
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        font-size: 23px;
        font-weight: 400;
        text-transform: uppercase;
        text-shadow:
          0 4px 0 var(--fab-color-text-ink, #203050),
          0 5px 0 rgba(0, 0, 0, 0.15);
      }
      .mr-settings-actions--menu .fab-btn.mr-settings-action--close {
        width: min(286px, 86%);
        font-size: 27px;
      }
      .fab-modal-actions .fab-btn.mr-settings-action:active:not(:disabled) {
        transform: translateY(3px);
        box-shadow: none;
      }
      .mr-settings-reset {
        pointer-events: auto;
        cursor: pointer;
        border: 0;
        padding: 0 6px 2px;
        background: transparent;
        color: var(--fab-color-text-ink, #203050);
        font-family: 'Titan One', var(--fab-font-family, system-ui, sans-serif);
        font-size: 16px;
        font-weight: 400;
        line-height: 1.1;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        text-decoration-line: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 4px;
      }
      .mr-settings-reset:active {
        transform: translateY(1px);
      }
      @media (max-width: 360px), (max-height: 740px) {
        .fab-modal-card.fab-result-card {
          padding: 82px 34px 50px;
        }
        .fab-result-card .fab-modal-ribbon {
          top: -68px;
          width: min(114%, 360px);
        }
        .fab-result-card .fab-modal-ribbon--image .fab-modal-ribbon-eyebrow {
          font-size: 13px;
        }
        .fab-result-card .fab-result-art {
          width: 112px;
        }
        .fab-result-card .fab-result-art.mr-result-emoji {
          font-size: 84px;
        }
        .fab-result-card .fab-result-message {
          font-size: 22px;
        }
        .fab-result-card .fab-modal-actions {
          width: min(78vw, 292px);
          gap: 24px;
        }
        .fab-result-card--win .fab-modal-actions {
          top: calc(100% + 72px);
          width: min(60vw, 226px);
        }
        .fab-modal-actions .fab-btn.mr-result-cta {
          min-height: 68px;
          font-size: 25px;
        }
        .fab-modal-card.mr-settings-card {
          padding: 82px 25px 26px;
          min-height: min(70vh, 535px);
        }
        .mr-settings-card .fab-modal-ribbon {
          top: -63px;
          width: min(104%, 330px);
        }
        .mr-settings-card .fab-modal-ribbon-title {
          font-size: 28px;
        }
        .fab-btn.mr-settings-close {
          top: -59px;
          width: 54px;
          min-width: 54px;
          height: 54px;
          min-height: 54px;
          font-size: 24px;
        }
        .mr-settings-toggles {
          margin-bottom: 23px;
        }
        .mr-settings-card .fab-toggle-row {
          min-height: 63px;
          padding: 8px 13px 8px 17px;
        }
        .mr-settings-card .fab-toggle-row-label {
          font-size: 22px;
        }
        .mr-settings-card .fab-toggle-switch {
          width: 72px;
          height: 42px;
        }
        .mr-settings-card .fab-toggle-slider::before {
          width: 32px;
          height: 32px;
        }
        .mr-settings-card .fab-toggle-input:checked + .fab-toggle-slider::before {
          transform: translateX(30px);
        }
        .fab-modal-actions .fab-btn.mr-settings-action {
          width: min(198px, 68%);
          font-size: 21px;
        }
        .mr-settings-actions--menu .fab-btn.mr-settings-action--close {
          width: min(248px, 84%);
          font-size: 24px;
        }
        .mr-settings-reset {
          font-size: 14px;
        }
        .mr-modal-board--result {
          width: min(94vw, 382px);
          --fab-modal-backplate-transform: translate(-50%, calc(-50% + 33px));
        }
        .mr-modal-board--settings {
          width: min(98vw, 394px);
          height: min(67vh, 520px);
          --fab-modal-backplate-transform: translate(-50%, calc(-50% + 46px));
        }
      }

      /* ---- Menu ambient confetti (fixed layer, torn down with the menu) ---- */
      .mr-confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .mr-confetti-fleck {
        position: absolute;
        top: -16px;
        width: 8px;
        height: 13px;
        border-radius: 2px;
        opacity: 0.85;
        animation: mr-confetti-fall linear infinite;
      }
      @keyframes mr-confetti-fall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 0;
        }
        12% {
          opacity: 0.85;
        }
        100% {
          transform: translateY(105vh) rotate(320deg);
          opacity: 0.85;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .mr-confetti-fleck {
          animation: none;
          display: none;
        }
      }
      /* Gameplay screen-shake (BoardScene toggles body.mistake-feedback — S6). */
      body.mistake-feedback #scene {
        animation: mr-shake 0.32s ease;
      }
      @keyframes mr-shake {
        0%,
        100% {
          transform: translate(0, 0);
        }
        20% {
          transform: translate(-6px, 2px);
        }
        40% {
          transform: translate(6px, -2px);
        }
        60% {
          transform: translate(-4px, 3px);
        }
        80% {
          transform: translate(4px, -3px);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="hud"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
