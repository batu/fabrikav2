<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Marble Run · Phaser Editor saved-scene Preview</title>
    <style>
      @font-face { font-family: "Fredoka One"; src: var(--fredoka-url) format("woff2"); }
      @font-face { font-family: "Titan One"; src: var(--titan-url) format("truetype"); }
      :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #11131a; color: #fff; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
      header { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 10px 14px; background: #171b25; border-bottom: 1px solid #2b3242; }
      header strong { margin-right: auto; }
      select { font: inherit; color: inherit; background: #252b39; border: 1px solid #47516a; border-radius: 8px; padding: 7px 10px; }
      .stamp { font: 12px ui-monospace, monospace; color: #a9b5cc; }
      main { min-height: 0; display: grid; place-items: center; padding: 14px; overflow: auto; }
      .device { position: relative; width: min(390px, calc((100vh - 92px) * 390 / 844), calc(100vw - 28px)); aspect-ratio: 390 / 844; overflow: hidden; background: #6b568e; box-shadow: 0 18px 60px #000a; border-radius: 24px; }
      .scene { position: absolute; left: 0; top: 0; width: 390px; height: 844px; transform-origin: top left; overflow: hidden; }
      .object { position: absolute; transform-origin: center; }
      .container { position: absolute; }
      .rectangle { border-style: solid; }
      .text { white-space: pre-line; line-height: 1.08; }
      .error { max-width: 720px; padding: 20px; color: #ffb4ab; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <header>
      <strong>Marble Run · saved Phaser Editor scenes</strong>
      <label>Scene <select id="scene-picker"></select></label>
      <span class="stamp" id="revision">loading revision…</span>
    </header>
    <main><div class="device"><div class="scene" id="scene"></div></div></main>
    <script type="module" src="./renderer.mjs"></script>
  </body>
</html>
