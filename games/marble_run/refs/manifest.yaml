# refcap-compare manifest for marble_run.
# Drives paired reference(android) + v2(apple/web) capture into a side-by-side
# grid per canonical state. Consumed by tools/refcap-compare.
# Fixes ledger C4/B1/B2/B3 + the A5 package-stamp near-miss.
game: marble_run

# REFERENCE lane = the authoritative Android app, captured over the ubuntu-server
# adb bridge. Package is foreground-verified (dumpsys) before every screencap and
# stamped into per-capture metadata.
reference:
  package: com.basegamelab.marblerun
  version: unknown            # stamp real versionName when captured live
  device: Pixel 6a 1080x2400 @420dpi
  host: ubuntu-server
  adb: /home/batu/android-sdk/platform-tools/adb
  serial: null               # fill in for a live run: --serial or here

# V2 lane = the fabrika v2 port, driven by the game harness driveTo(state).
# Gated on the sibling harness card; until it lands the v2 lane is offline-only.
v2:
  package: com.fabrikav2.marble_run
  version: dev
  viewport: 390x844

# Canonical states. Each state names a reference source and a v2 source.
# offline: committed PNG consumed by `--offline` (the path the AC exercises).
# recipe/driveTo: the live-lane instructions (coded, not run in the sandbox).
# manual: true -> operator drives the phone and confirms before capture (never
#         blind-tap); win/fail on the 3D board are not reachable by taps.
states:
  - name: menu
    reference:
      offline: refs/captures/android-basegamelab/menu.png
      recipe: launch app cold; lands on the saga menu
    v2:
      offline: evidence/2026-07-06-1328-fixed/v2-menu.png
      driveTo: menu

  - name: level
    reference:
      offline: refs/captures/android-basegamelab/level-start.png
      recipe: from menu, tap the green LEVEL button
    v2:
      offline: evidence/2026-07-06-1328-fixed/v2-level.png
      driveTo: level

  - name: settings
    reference:
      offline: refs/captures/android-basegamelab/settings.png
      recipe: from menu, tap the gear; modal opens over dimmed menu
    v2:
      offline: evidence/2026-07-06-1328-fixed/v2-settings.png
      driveTo: settings

  - name: pause
    reference:
      gap: "no reference pause capture exists (refs README) — documented gap"
    v2:
      offline: evidence/2026-07-06-0953-v2-screens/04-pause-overlay.png
      driveTo: pause

  - name: win
    reference:
      offline: refs/captures/android-basegamelab/win-ref.png
      manual: true
      prompt: "Drive the phone to the WIN / level-complete screen, then press ENTER to capture."
    v2:
      offline: evidence/2026-07-06-0953-v2-screens/05-result-card.png
      driveTo: win

  - name: fail
    reference:
      offline: refs/captures/android-basegamelab/fail-ref.png
      manual: true
      prompt: "Drive the phone to the FAIL screen, then press ENTER to capture."
    v2:
      gap: "no trusted v2 fail capture committed yet — documented gap"
      driveTo: fail
