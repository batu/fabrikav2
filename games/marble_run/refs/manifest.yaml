    state-variant: menu/cold-start
    capture-recipe: launch the Android reference app cold and wait for the saga menu to settle
    at-rest: true
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

  refs/captures/android-basegamelab/level-start.png:
    state-variant: level/start
    capture-recipe: from the saga menu, tap the green LEVEL button and capture after the board settles
    at-rest: true
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

  refs/captures/android-basegamelab/level-mid.png:
    state-variant: level/mid-ambient-animation
    capture-recipe: from a started level, wait several seconds and capture the ongoing board state
    at-rest: true
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

  refs/captures/android-basegamelab/level-ref-full.png:
    state-variant: level/fullscreen-reference
    capture-recipe: from a started level, capture the fullscreen Android reference board without status-bar chrome
    at-rest: true
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

  refs/captures/android-basegamelab/settings.png:
    state-variant: settings/from-menu-close-reset-progress
    capture-recipe: from the saga menu, tap the gear and capture the settings modal with CLOSE and RESET PROGRESS actions
    at-rest: true
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

  refs/captures/android-basegamelab/settings-inlevel-restart-home.png:
    state-variant: settings/from-level-restart-home
    capture-recipe: from an active level, tap the gear and capture the settings modal with RESTART and HOME actions
    at-rest: true
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

  refs/captures/android-basegamelab/win-ref.png:
    state-variant: win/manual-level-complete
    capture-recipe: human-drive the Android reference app to the settled WIN screen, then capture after the level-complete card is idle
    at-rest: true
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

  refs/captures/android-basegamelab/fail-ref.png:
    state-variant: fail/mid-load-unsafe
    capture-recipe: human-drive the Android reference app toward a fail state; current capture was taken before the fail screen settled
    at-rest: false
    not-at-rest-reason: contains a mid-load LOADING button and is not a stable fail screen
    recapture-note: recapture after human or scripted play reaches the settled fail overlay; keep excluded from verify-device judging until then
    provenance:
      source: shipped-capture
      package: com.basegamelab.marblerun
      device: Pixel 6a 1080x2400 @420dpi
      host: ubuntu-server
      tool: adb screencap with foreground package verified by dumpsys
      captured: 2026-07-06

# Canonical states. Each state names a reference source and a v2 source.
# offline: committed PNG consumed by `--offline` (the path the AC exercises).
# recipe/driveTo: the live-lane instructions (coded, not run in the sandbox).
# manual: true -> operator drives the phone and confirms before capture (never
#         blind-tap); win/fail on the 3D board are not reachable by taps.
states:
  - name: menu
    reference:
      offline: refs/captures/android-basegamelab/menu.png
      recipe: launch app cold; lands on the saga menu
    v2:
      offline: evidence/2026-07-06-1328-fixed/v2-menu.png
      driveTo: menu

  - name: level
    reference:
      offline: refs/captures/android-basegamelab/level-start.png
      recipe: from menu, tap the green LEVEL button
    v2:
      offline: evidence/2026-07-06-1328-fixed/v2-level.png
      driveTo: level

  - name: settings
    reference:
      offline: refs/captures/android-basegamelab/settings.png
      recipe: from menu, tap the gear; modal opens over dimmed menu
    v2:
      offline: evidence/2026-07-06-1328-fixed/v2-settings.png
      driveTo: settings

  - name: pause
    reference:
      gap: "no reference pause capture exists (refs README) — documented gap"
    v2:
      offline: evidence/2026-07-06-0953-v2-screens/04-pause-overlay.png
      driveTo: pause

  - name: win
    reference:
      offline: refs/captures/android-basegamelab/win-ref.png
      manual: true
      prompt: "Drive the phone to the WIN / level-complete screen, then press ENTER to capture."
    v2:
      offline: evidence/2026-07-06-0953-v2-screens/05-result-card.png
      driveTo: win

  - name: fail
    reference:
      offline: refs/captures/android-basegamelab/fail-ref.png
      manual: true
      prompt: "Drive the phone to the FAIL screen, then press ENTER to capture."
    v2:
      gap: "no trusted v2 fail capture committed yet — documented gap"
      driveTo: fail
