version: 1.0

project:
  name: wool_crush
  genre: [casual, puzzle]
  platform: mobile
  source_frames: games/wool_crush/refs/art/extracted.json

style:
  rendering: tactile_knitted_3d
  complexity: medium_high
  readability: very_high
  mood: [cheerful, plush, bright, toy_like]
  camera: front_orthographic_mobile
  safe_area: portrait_phone

shape:
  language: rounded_soft
  corner_radius: large
  silhouettes: [pill_buttons, chunky_tiles, knitted_rope_tracks, rounded_popup_panels]
  edge_treatment: beveled_with_soft_shadow

material:
  yarn: braided_fiber_with_directional_stitches
  track: matte_fabric_path
  panels: glossy_plastic_and_soft_cream_cards
  currency: polished_gold_coin
  characters: knitted_plush
  controls: glossy_plastic_buttons

lighting:
  direction: top_left
  highlight: strong_gloss_on_controls
  shadow: soft_bottom_drop_shadow
  ambient: bright_outdoor_game

palette:
  yarn: ["#f93633", "#b21ea7", "#1f61ef", "#6926c0", "#f6a72d", "#1feed5", "#06bc00", "#ff8805"]
  board: ["#cef599", "#edbe7e", "#fde7ca", "#d9b68b"]
  panel: ["#ffeccf", "#fad8be", "#ffad40", "#7944e4", "#bdc2d6"]
  button: ["#9de92e", "#44b2fc", "#fdd12c", "#f74849", "#3f8bf4"]
  coin: ["#ffdc3d", "#ffc32a", "#faa112", "#fca808"]
  dragon: ["#f75240", "#bc3849", "#76d0dc", "#b32019", "#bf5a2a", "#c79a8d"]
  companion: ["#ec8b1f", "#ffe48b", "#335a8e", "#d6b49a"]
  text: ["#fffdff", "#794122", "#9d3c0f", "#ab4648"]
  background: ["#459fed", "#afe2e9", "#f89c31", "#cef599"]
  highlight: ["#fff4d0", "#f6f8ff", "#fdfeff"]
  shadow: ["#1d1916", "#5011a4", "#c66f1f"]

color_map:
  gameplay_board: ["#cef599", "#edbe7e", "#fde7ca", "#d9b68b"]
  yarn_ball_tiles: ["#f93633", "#b21ea7", "#1f61ef", "#6926c0", "#f6a72d", "#1feed5", "#06bc00", "#ff8805"]
  menu_hud: ["#459fed", "#9de92e", "#faa112", "#fffdff"]
  shop_panels: ["#f89c31", "#ffeccf", "#3f8bf4", "#ffdc3d", "#7944e4"]
  settings_popup: ["#fad8be", "#fdd12c", "#44b2fc", "#f74849", "#794122"]
  failure_overlay: ["#1d1916", "#bdc2d6", "#f6f8ff", "#9de92e"]

typography:
  font_feel: chunky_rounded_sans
  weight: bold
  case: title_and_short_labels
  treatment: white_fill_with_brown_or_blue_shadow
  role: high_contrast_mobile_ui

composition:
  gameplay: board_top_track_bottom_puzzle_grid
  menus: full_bleed_scene_with_bottom_tab_bar
  dialogs: centered_cream_card_under_dim_overlay
  shop: stacked_cards_with_blue_price_bands_and_gold_rewards

negative:
  - flat_vector
  - sharp_corners
  - dark_theme
  - realistic_metal
  - thin_line_icons
  - desaturated_palette

low_confidence_groups:
  - dragon_track: animated rope/dragon states vary across frames and some samples are motion-obscured.
  - companion: cat and dragon character colors differ between bright menu and dim fail overlays.
  - failure_overlay: gray banner and dim overlay are state-specific, not core gameplay tokens.

confidence:
  source_frame_coverage: 1.0
  palette_yarn: 0.92
  palette_board_track: 0.88
  palette_panels_buttons: 0.87
  palette_coin: 0.91
  dragon_track: 0.72
  companion_characters: 0.68
  typography: 0.8
  failure_overlay: 0.7
