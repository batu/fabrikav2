style_ref: style_guide.yaml
type: button
title: Glossy rounded mobile buttons
aspect_ratio: "3:1"

description: >
  Large pill and rounded-square controls with glossy gradients, thick soft
  borders, white bold labels, and safe mobile tap targets. Primary action is
  green; secondary/retry is blue; home and reward buttons use yellow; close
  and danger states use red.

palette_roles: [button, text, highlight, shadow]
states:
  - primary_green
  - secondary_blue
  - reward_yellow
  - close_red
  - shop_blue_band

shape:
  corner_radius: pill_or_large_roundrect
  bevel: glossy_top_highlight
  label: chunky_white_with_shadow

negative:
  - thin_outlined_buttons
  - text_only_links
  - square_corners
  - muted_disabled_palette
