# refcap-compare manifest STUB for a fresh `create-game` scaffold (card vFSI5FwY).
# Modelled on games/marble_run/refs/manifest.yaml; loaded by
# tools/refcap-compare/src/manifest.mjs `loadManifest`. Every state below is an
# explicit "gap" until a lane selects a primary `offline:` PNG. Folded
# video-extract refs can exist in `refs:` before they become lane defaults; do
# not delete states to "pass" — absence must stay documented.
game: wool_crush

# REFERENCE lane = a third-party/prior-version app captured for comparison, over
# the ubuntu-server adb bridge (see games/marble_run/refs/manifest.yaml). A
# fresh game usually starts with none. Wool Crush now has folded video-extract
# refs, while the reference lane still has no primary offline selection.
reference:
  package: com.example.woolcrush   # TODO(reference-package): confirm the real reference bundle id with Batu.
  version: unknown
  device: unknown
  host: ubuntu-server
  adb: /home/batu/android-sdk/platform-tools/adb
  serial: null

# V2 lane = this fabrikav2 port, driven by the game harness `driveTo(state)`
# (`@fabrikav2/testkit/testing`, wired in `../src/shell/harness.ts`).
v2:
  package: com.fabrikav2.wool_crush   # create-game substitutes this to com.fabrikav2.<game>.
  version: dev
  viewport: 390x844

