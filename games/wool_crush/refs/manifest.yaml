# Canonical states plus per-game video-extract states.
# Each lane needs either "offline" (a committed PNG) or an explicit "gap".
states:
  - name: menu
    reference:
      gap: "video-extract refs exist under refs/captures/video-extract; no primary offline reference selected yet"
    v2:
      gap: "no v2 capture yet"
      driveTo: menu

  - name: level
    reference:
      gap: "no reference capture — fresh scaffold, nothing captured yet"
    v2:
      gap: "no v2 capture yet"
      driveTo: level

  - name: settings
    reference:
      gap: "video-extract refs exist under refs/captures/video-extract; no primary offline reference selected yet"
    v2:
      gap: "no v2 capture yet"
      driveTo: settings

  - name: pause
    reference:
      gap: "no reference capture — fresh scaffold, nothing captured yet"
    v2:
      gap: "no v2 capture yet"
      driveTo: pause

  - name: win
    reference:
      gap: "video-extract refs exist under refs/captures/video-extract; no primary offline reference selected yet"
    v2:
      gap: "no v2 capture yet"
      driveTo: win

  - name: fail
    reference:
      gap: "video-extract refs exist under refs/captures/video-extract; no primary offline reference selected yet"
    v2:
      gap: "no v2 capture yet"
      driveTo: fail

  - name: gameplay
    reference:
      gap: video-extract refs folded under refs/captures/video-extract; no primary offline reference selected yet
    v2:
      gap: no v2 capture selected for this video-extracted state

  - name: other
    reference:
      gap: video-extract refs folded under refs/captures/video-extract; no primary offline reference selected yet
    v2:
      gap: no v2 capture selected for this video-extracted state
