<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'self'; font-src 'none'; connect-src 'none'; script-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Fail</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main data-shell-page="fail" data-render-ready="true" aria-label="Fail">
    <i data-safe-guide="top" aria-hidden="true"></i><i data-safe-guide="bottom" aria-hidden="true"></i><section data-shell-instance="fail.panel" data-role="result-panel" data-binding="presentation.static" data-hidden="false" data-container="true"><span data-shell-title>Try Again</span></section><section data-shell-instance="fail.retry" data-role="bottom-primary-action" data-binding="flow.retry" data-hidden="false" data-action-id="fail-retry"><img alt="" aria-hidden="true" src="../assets/button-surface-primary.png" data-asset-id="button-surface.primary"><span data-shell-copy>Retry</span></section><section data-shell-instance="fail.currency" data-role="currency-counter" data-binding="state.primary-currency" data-hidden="false"><img alt="" aria-hidden="true" src="../assets/counter-frame-primary-currency.png" data-asset-id="counter-frame.primary-currency"><span data-shell-copy>25 Coins</span></section><section data-shell-instance="fail.continue-coins" data-role="bottom-secondary-action" data-binding="flow.continue-coins" data-hidden="false" data-action-id="fail-continue-coins"><img alt="" aria-hidden="true" src="../assets/button-surface-secondary.png" data-asset-id="button-surface.secondary"><span data-shell-copy>Continue · 10 Coins</span></section><section data-shell-instance="fail.bundle" data-role="bottom-secondary-action" data-binding="commerce.bundle" data-hidden="false"><img alt="" aria-hidden="true" src="../assets/button-surface-secondary.png" data-asset-id="button-surface.secondary"><span data-shell-copy>Rescue bundle · $4.99</span></section>
  </main>
</body>
</html>
