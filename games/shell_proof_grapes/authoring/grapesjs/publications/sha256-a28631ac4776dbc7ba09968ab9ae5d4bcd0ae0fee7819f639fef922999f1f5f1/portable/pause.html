<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'self'; font-src 'none'; connect-src 'none'; script-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Pause</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main data-shell-page="pause" data-render-ready="true" aria-label="Pause">
    <i data-safe-guide="top" aria-hidden="true"></i><i data-safe-guide="bottom" aria-hidden="true"></i><section data-shell-instance="pause.panel" data-role="modal-panel" data-binding="presentation.static" data-hidden="false" data-container="true"><span data-shell-title>Paused</span></section><section data-shell-instance="pause.resume" data-role="bottom-primary-action" data-binding="flow.resume" data-hidden="false" data-action-id="resume"><img alt="" aria-hidden="true" src="../assets/button-surface-primary.png" data-asset-id="button-surface.primary"><span data-shell-copy>Resume</span></section><section data-shell-instance="pause.settings" data-role="bottom-secondary-action" data-binding="flow.open-settings" data-hidden="false" data-action-id="pause.settings"><img alt="" aria-hidden="true" src="../assets/button-surface-secondary.png" data-asset-id="button-surface.secondary"><span data-shell-copy>Settings</span></section><section data-shell-instance="pause.home" data-role="bottom-secondary-action" data-binding="flow.pause-home" data-hidden="false" data-action-id="pause-home"><img alt="" aria-hidden="true" src="../assets/button-surface-secondary.png" data-asset-id="button-surface.secondary"><span data-shell-copy>Home</span></section>
  </main>
</body>
</html>
