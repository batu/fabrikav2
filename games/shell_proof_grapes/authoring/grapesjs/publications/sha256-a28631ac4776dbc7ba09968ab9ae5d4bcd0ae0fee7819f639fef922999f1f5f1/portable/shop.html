<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'self'; font-src 'none'; connect-src 'none'; script-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Shop</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main data-shell-page="shop" data-render-ready="true" aria-label="Shop">
    <i data-safe-guide="top" aria-hidden="true"></i><i data-safe-guide="bottom" aria-hidden="true"></i><section data-shell-instance="shop.page" data-role="page-surface" data-binding="presentation.static" data-hidden="false" data-container="true"></section><section data-shell-instance="shop.title" data-role="screen-title" data-binding="presentation.static" data-hidden="false"><span data-shell-copy>Shop</span></section><section data-shell-instance="shop.back" data-role="header-back-action" data-binding="flow.shop-back" data-hidden="false" data-action-id="shop-back"><img alt="" aria-hidden="true" src="../assets/icon-control-back.png" data-asset-id="icon-control.back"></section><section data-shell-instance="shop.currency" data-role="currency-counter" data-binding="state.primary-currency" data-hidden="false"><img alt="" aria-hidden="true" src="../assets/counter-frame-primary-currency.png" data-asset-id="counter-frame.primary-currency"></section><section data-shell-instance="shop.currency.secondary" data-role="currency-counter" data-binding="state.secondary-currency" data-hidden="false"><img alt="" aria-hidden="true" src="../assets/counter-frame-primary-currency.png" data-asset-id="counter-frame.primary-currency"></section><section data-shell-instance="shop.grid" data-role="item-grid" data-binding="state.shop-items" data-hidden="false" data-container="true"></section><section data-shell-instance="shop.item.available" data-role="item-card" data-binding="state.shop-items" data-hidden="false"><span data-shell-copy>Item A</span></section><section data-shell-instance="shop.item.owned" data-role="item-card" data-binding="state.shop-items" data-hidden="false"><span data-shell-copy>Item B</span></section><section data-shell-instance="shop.item.locked" data-role="item-card" data-binding="state.shop-items" data-hidden="false"><span data-shell-copy>Item C</span></section><section data-shell-instance="shop.restore" data-role="bottom-secondary-action" data-binding="commerce.restore" data-hidden="false" data-action-id="shop-restore"><img alt="" aria-hidden="true" src="../assets/button-surface-secondary.png" data-asset-id="button-surface.secondary"><span data-shell-copy>Restore</span></section>
  </main>
</body>
</html>
