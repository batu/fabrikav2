<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'self'; font-src 'none'; connect-src 'none'; script-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Progression Home</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main data-shell-page="menu" data-render-ready="true" aria-label="Progression Home">
    <i data-safe-guide="top" aria-hidden="true"></i><i data-safe-guide="bottom" aria-hidden="true"></i><section data-shell-instance="menu.title" data-role="screen-title" data-binding="presentation.static" data-hidden="false"><span data-shell-copy>Game Title</span></section><section data-shell-instance="menu.hero" data-role="hero-art" data-binding="presentation.static" data-hidden="false"><span data-shell-placeholder>Hero Art</span></section><section data-shell-instance="menu.currency" data-role="currency-counter" data-binding="state.primary-currency" data-hidden="false"><img alt="" aria-hidden="true" src="../assets/counter-frame-primary-currency.png" data-asset-id="counter-frame.primary-currency"></section><section data-shell-instance="menu.progression-map" data-role="progression-map" data-binding="state.progression" data-hidden="false" data-container="true"></section><section data-shell-instance="menu.node.completed" data-role="progression-node" data-binding="state.progression" data-hidden="false"><img alt="" aria-hidden="true" src="../assets/progression-node-completed.png" data-asset-id="progression-node.completed"></section><section data-shell-instance="menu.node.current" data-role="progression-node" data-binding="flow.start-current" data-hidden="false" data-action-id="play"><img alt="" aria-hidden="true" src="../assets/progression-node-current.png" data-asset-id="progression-node.current"></section><section data-shell-instance="menu.node.locked" data-role="progression-node" data-binding="state.progression" data-hidden="false"><img alt="" aria-hidden="true" src="../assets/progression-node-locked.png" data-asset-id="progression-node.locked"></section><section data-shell-instance="menu.nav" data-role="bottom-nav" data-binding="presentation.static" data-hidden="false" data-container="true"></section><section data-shell-instance="menu.shop" data-role="top-icon-action" data-binding="flow.open-shop" data-hidden="false" data-action-id="menu.shop"><img alt="" aria-hidden="true" src="../assets/icon-control-shop.png" data-asset-id="icon-control.shop"></section><section data-shell-instance="menu.play" data-role="bottom-primary-action" data-binding="flow.start-current" data-hidden="false" data-action-id="play"><img alt="" aria-hidden="true" src="../assets/button-surface-primary.png" data-asset-id="button-surface.primary"><span data-shell-copy>Play</span></section><section data-shell-instance="menu.settings" data-role="top-icon-action" data-binding="flow.open-settings" data-hidden="false" data-action-id="menu.settings"><img alt="" aria-hidden="true" src="../assets/icon-control-settings.png" data-asset-id="icon-control.settings"></section>
  </main>
</body>
</html>
