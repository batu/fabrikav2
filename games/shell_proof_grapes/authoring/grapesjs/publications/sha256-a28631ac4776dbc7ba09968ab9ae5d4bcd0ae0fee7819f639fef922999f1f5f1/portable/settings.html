<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'self'; font-src 'none'; connect-src 'none'; script-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Settings</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main data-shell-page="settings" data-render-ready="true" aria-label="Settings">
    <i data-safe-guide="top" aria-hidden="true"></i><i data-safe-guide="bottom" aria-hidden="true"></i><section data-shell-instance="settings.page" data-role="page-surface" data-binding="presentation.static" data-hidden="false" data-container="true"></section><section data-shell-instance="settings.title" data-role="screen-title" data-binding="presentation.static" data-hidden="false"><span data-shell-copy>Settings</span></section><section data-shell-instance="settings.back" data-role="header-back-action" data-binding="flow.settings-back" data-hidden="false" data-action-id="settings-back"><img alt="" aria-hidden="true" src="../assets/icon-control-back.png" data-asset-id="icon-control.back"></section><section data-shell-instance="settings.music" data-role="center-toggle-action" data-binding="settings.music" data-hidden="false" data-toggle="true" data-action-id="settings.music"><span data-shell-copy>Music</span><span data-shell-switch data-toggle-state="on"></span></section><section data-shell-instance="settings.sfx" data-role="center-toggle-action" data-binding="settings.sfx" data-hidden="false" data-toggle="true" data-action-id="settings.sfx"><span data-shell-copy>SFX</span><span data-shell-switch data-toggle-state="on"></span></section><section data-shell-instance="settings.haptics" data-role="center-toggle-action" data-binding="settings.haptics" data-hidden="false" data-toggle="true" data-action-id="settings.haptics"><span data-shell-copy>Haptics</span><span data-shell-switch data-toggle-state="on"></span></section>
  </main>
</body>
</html>
