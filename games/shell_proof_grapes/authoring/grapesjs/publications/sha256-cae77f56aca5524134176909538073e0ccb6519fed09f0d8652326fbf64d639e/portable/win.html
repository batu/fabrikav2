<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self'; style-src 'self'; font-src 'none'; connect-src 'none'; script-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Win</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main data-shell-page="win" data-render-ready="true" aria-label="Win">
    <i data-safe-guide="top" aria-hidden="true"></i><i data-safe-guide="bottom" aria-hidden="true"></i><section data-shell-instance="win.panel" data-role="result-panel" data-binding="presentation.static" data-hidden="false" data-container="true"><span data-shell-title>You Win</span></section><section data-shell-instance="win.next" data-role="bottom-primary-action" data-binding="flow.next" data-hidden="true"><img alt="" aria-hidden="true" src="../assets/button-surface-primary.png" data-asset-id="button-surface.primary"><span data-shell-copy>Next</span></section><section data-shell-instance="win.home" data-role="bottom-secondary-action" data-binding="flow.result-home" data-hidden="true"><img alt="" aria-hidden="true" src="../assets/button-surface-secondary.png" data-asset-id="button-surface.secondary"><span data-shell-copy>Home</span></section><section data-shell-instance="win.reward" data-role="level-label" data-binding="state.reward-amount" data-hidden="false"><span data-shell-copy>5 Coins earned</span></section><section data-shell-instance="win.claim" data-role="bottom-primary-action" data-binding="flow.claim" data-hidden="false" data-action-id="win-claim"><img alt="" aria-hidden="true" src="../assets/button-surface-primary.png" data-asset-id="button-surface.primary"><span data-shell-copy>Claim</span></section><section data-shell-instance="win.claim-double" data-role="bottom-secondary-action" data-binding="flow.claim-double" data-hidden="false" data-action-id="win-claim-double"><img alt="" aria-hidden="true" src="../assets/button-surface-secondary.png" data-asset-id="button-surface.secondary"><span data-shell-copy>Claim 2x · Watch ad</span></section>
  </main>
</body>
</html>
