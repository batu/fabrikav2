# refcap-compare / verify-device manifest for CAMELEON (Sunwash Lido).
# CAMELEON is an ORIGINAL title designed in this repo (docs/DESIGN.md) — there is
# no shipped reference app, so every reference-lane entry is a documented gap.
# The v2 lane is driven by the game harness driveTo(state) over the canonical
# six-state allstates tour (src/main.ts wires CAMELEON_DEVICE_TOUR_STATES).
game: cameleon

reference:
  package: none                       # original game — no reference app exists
  version: n/a
  device: n/a
  host: n/a
  adb: n/a
  serial: null

v2:
  package: com.basegamelab.cameleon.dev
  version: dev
  viewport: 390x844

verifyDevice:
  platform: ios

# Canonical states. First device run captures become the at-rest references
# after conductor eyeball; until then v2 offline entries are explicit gaps.
states:
  - name: menu
    reference:
      gap: "original title — no reference app"
    v2:
      gap: "no committed capture yet — first device run pending"
      driveTo: menu

  - name: level
    reference:
      gap: "original title — no reference app"
    v2:
      gap: "no committed capture yet — first device run pending"
      driveTo: level

  - name: settings
    reference:
      gap: "original title — no reference app"
    v2:
      gap: "no committed capture yet — first device run pending"
      driveTo: settings

  - name: pause
    reference:
      gap: "original title — no reference app"
    v2:
      gap: "no committed capture yet — first device run pending"
      driveTo: pause

  - name: win
    reference:
      gap: "original title — no reference app"
    v2:
      gap: "no committed capture yet — first device run pending"
      driveTo: win

  - name: fail
    reference:
      gap: "original title — no reference app"
    v2:
      gap: "no committed capture yet — first device run pending"
      driveTo: fail
