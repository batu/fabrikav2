# refcap-compare / verify-device manifest for CAMELEON (Sunwash Lido).
# CAMELEON is an ORIGINAL title designed in this repo (docs/DESIGN.md) — there is
# no shipped reference app, so every reference-lane entry is a documented gap.
# The v2 lane is driven by the game harness driveTo(state) over the canonical
# six-state allstates tour (src/main.ts wires CAMELEON_DEVICE_TOUR_STATES).
game: cameleon

reference:
  package: none                       # original game — no reference app exists
  version: n/a
  device: n/a
  host: n/a
  adb: n/a
  serial: null

v2:
  package: com.basegamelab.cameleon.dev
  version: dev
  viewport: 390x844

verifyDevice:
  platform: ios

# Canonical states. CAMELEON is original — the reference lane is the AT-REST
# baseline: device captures accepted by conductor eyes (2026-07-09 round 4)
# become the committed reference set future device runs are scored against.
states:
  - name: menu
    reference:
      offline: refs/captures/device-2026-07-09-v2/menu.png
      recipe: at-rest baseline — own device capture, conductor-accepted 2026-07-09 (v2: kit shell + original-styles multi-level build)
    v2:
      offline: refs/captures/device-2026-07-09-v2/menu.png
      driveTo: menu

