# xcodegen spec for the committed verify-device XCUITest runner. Generalised from
# games/marble_run/.work/insitu-runner/project.yml (the proven runner). The CLI
# runs `xcodegen generate` here before `xcodebuild test`. The committed default
# team id keeps the generated pbxproj valid; steps.mjs passes any runtime
# DEVELOPMENT_TEAM override as an xcodebuild build setting.
name: VerifyDeviceRunner
options:
  bundleIdPrefix: com.appletolye.verifydevice
targets:
  VerifyDeviceRunner:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources: [VerifyDeviceRunner]
    settings:
      base:
        DEVELOPMENT_TEAM: 42L77JAX72
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.appletolye.verifydevice.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  VerifyDeviceRunner:
    build:
      targets:
        VerifyDeviceRunner: [test]
    test:
      targets: [VerifyDeviceRunner]
